<h1>How to run this application locally</h1>
<p>
  Do not hesitate to run the application locally
  (<a href="https://github.com/amadeusitgroup/ngrx-devtool#readme" target="_blank" rel="noopener">Prerequisites software</a>)
</p>

<div class="code-block">
  <button class="copy-btn" (click)="copyCode()" title="Copy to clipboard">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
      <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
    </svg>
  </button>
  <pre><code>{{runAppCommands}}</code></pre>
</div>

<p>
  Then open the DevTool UI at
  <a href="http://localhost:3000" target="_blank" rel="noopener">http://localhost:3000</a>
</p>
